<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    .roblox-red { fill: #FF5757; }
  </style>
  <g class="roblox-red">
    <!-- Top chevron -->
    <polygon points="100,20 160,50 160,80 100,50 40,80 40,50"/>
    
    <!-- Left side -->
    <polygon points="40,80 20,100 20,160 60,160 60,100"/>
    
    <!-- Center hexagon -->
    <polygon points="100,90 140,110 140,150 100,170 60,150 60,110"/>
    
    <!-- Right side -->
    <polygon points="160,100 140,80 140,140 160,160 180,160 180,100"/>
  </g>
</svg>